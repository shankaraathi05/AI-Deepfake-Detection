services:
  postgres:
    image: postgres:16
    container_name: truthnet-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-truthnet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-truthnet}
      POSTGRES_DB: ${POSTGRES_DB:-truthnet}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-truthnet}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-02-03T21-03-04Z
    container_name: truthnet-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: infra/backend.Dockerfile
    container_name: truthnet-backend
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app/backend

  frontend:
    build:
      context: .
      dockerfile: infra/frontend.Dockerfile
    container_name: truthnet-frontend
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app/frontend
      - /app/frontend/node_modules

volumes:
  pg_data:
  minio_data:
